# Smart Water System - Docker Compose
#
# Quick start:
#   1. Copy .env.example to .env and fill in your API keys
#   2. Edit zones.yaml for your yard
#   3. docker compose up -d
#   4. Open http://localhost:3000
#
# The system runs in shadow mode by default.
# Use the web UI settings page to switch to live mode.

services:
  smart-water:
    build: .
    container_name: smart-water
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - smart-water-data:/data
      - ./zones.yaml:/app/zones.yaml:ro
    env_file:
      - .env
    environment:
      - DB_PATH=/data/smart-water.db
      - STATUS_PAGE_PATH=/data/status.html
      - SHADOW_MODE=true

  # Hourly decision cycle
  scheduler:
    build: .
    container_name: smart-water-scheduler
    restart: unless-stopped
    volumes:
      - smart-water-data:/data
      - ./zones.yaml:/app/zones.yaml:ro
    env_file:
      - .env
    environment:
      - DB_PATH=/data/smart-water.db
    # Run every hour using shell loop (no cron in Alpine)
    entrypoint: /bin/sh
    command:
      - -c
      - |
        echo "Scheduler starting - runs every hour"
        while true; do
          echo "--- $(date) ---"
          node src/cli.js run
          sleep 3600
        done

  # Daily summary at 6am UTC
  summary:
    build: .
    container_name: smart-water-summary
    restart: unless-stopped
    volumes:
      - smart-water-data:/data
      - ./zones.yaml:/app/zones.yaml:ro
    env_file:
      - .env
    environment:
      - DB_PATH=/data/smart-water.db
    entrypoint: /bin/sh
    command:
      - -c
      - |
        echo "Summary service starting - runs daily at 6am UTC"
        while true; do
          current_hour=$(date -u +%H)
          if [ "$current_hour" = "06" ]; then
            node src/summary.js
            sleep 3600
          fi
          sleep 300
        done

  # Watchdog at 2am UTC
  watchdog:
    build: .
    container_name: smart-water-watchdog
    restart: unless-stopped
    volumes:
      - smart-water-data:/data
      - ./zones.yaml:/app/zones.yaml:ro
    env_file:
      - .env
    environment:
      - DB_PATH=/data/smart-water.db
    entrypoint: /bin/sh
    command:
      - -c
      - |
        echo "Watchdog starting - checks daily at 2am UTC"
        while true; do
          current_hour=$(date -u +%H)
          if [ "$current_hour" = "02" ]; then
            node src/watchdog.js
            sleep 3600
          fi
          sleep 300
        done

volumes:
  smart-water-data:
